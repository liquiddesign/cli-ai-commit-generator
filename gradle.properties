pluginGroup = com.lqd.claudecommit
pluginName = cli-ai-commit-generator
pluginVersion = 0.2.2

# Compile against this PhpStorm build. The plugin itself targets sinceBuild=261
# with no upper bound (see build.gradle.kts), so it loads on every 2026.x and later
# build, including EAPs/preview.
platformType = PS
platformVersion = 2026.1

# JDK 21 is required for the IntelliJ Platform 2024.3+
javaVersion = 21

kotlin.stdlib.default.dependency = false
org.gradle.configuration-cache = true
org.gradle.caching = true
org.gradle.jvmargs = -Xmx2g -XX:+UseG1GC
